# Force the MSVC linker (link.exe) instead of the default lld-link, which
# fails to resolve symbols from onig_sys (pulled in transitively by the
# `tokenizers` crate) on Windows.
[target.x86_64-pc-windows-msvc]
linker = "C:\\Program Files\\Microsoft Visual Studio\\2022\\Community\\VC\\Tools\\MSVC\\14.38.33130\\bin\\Hostx64\\x64\\link.exe"
