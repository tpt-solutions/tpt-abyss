# cargo-deny configuration for TPT Abyss.
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"
ignore = [
    # paste and number_prefix are unmaintained but have no safe upgrade; they
    # are pulled in transitively via gemm/tokenizers and indicatif respectively.
    "RUSTSEC-2024-0436",
    "RUSTSEC-2025-0119",
]

[licenses]
version = 2
# TPT Abyss is dual MIT OR Apache-2.0; permit the same and common permissive
# licenses used transitively by our dependencies.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    # webpki-roots (transitive via ureq/hf-hub) uses CDLA-Permissive-2.0,
    # a permissive data-sharing license compatible with our distribution.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
